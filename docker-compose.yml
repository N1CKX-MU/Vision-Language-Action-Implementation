# VLA Task - Docker Compose Configuration
# Supports GPU-accelerated running with X11 forwarding for PyBullet GUI

services:
  vla-task:
    build:
      context: .
      dockerfile: Docker/Dockerfile
    container_name: vla-task-container
    runtime: nvidia
    environment:
      # X11 forwarding for GUI
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      # CUDA settings
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
      # API keys (load from .env or set directly)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      # X11 socket for GUI
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # X authority for X11 authentication
      - ${HOME}/.Xauthority:/root/.Xauthority:ro
      # Optional: mount local .env file
      - ./.env:/app/.env:ro
    ports:
      - "8000:8000"
    ipc: host
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Override entrypoint to allow xhost
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "export XAUTHORITY=/root/.Xauthority &&
      export DISPLAY=${DISPLAY:-:0} &&
      cd /app &&
      exec bash"

  # Non-GUI version for headless servers
  vla-task-headless:
    build:
      context: .
      dockerfile: Docker/Dockerfile
    container_name: vla-task-headless
    runtime: nvidia
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - PYBULLET_USE_GUI=0
    volumes:
      - ./.env:/app/.env:ro
    ipc: host
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["python", "run.py", "--help"]
